<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef's Supply | 商用餐具独立站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #f8faf6; padding: 2rem 1rem; }
        .app-container { max-width: 1400px; margin: 0 auto; }
        .view.hidden { display: none; }
        /* 以下样式与之前完全一致，为节省篇幅省略，实际使用时复制完整样式 */
        .home-header { text-align: center; margin-bottom: 2rem; }
        .home-header h1 { font-size: 2.4rem; color: #2c5e2a; }
        .filters-bar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 2rem; background: #fff; padding: 0.8rem 1.5rem; border-radius: 60px; border: 1px solid #ece2d4; }
        .filter-tabs { display: flex; gap: 0.6rem; }
        .filter-btn { background: transparent; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; font-weight: 500; cursor: pointer; }
        .filter-btn.active { background: #2c5e2a; color: #fff; }
        .search-box { background: #fefaf5; border-radius: 48px; border: 1px solid #e4dacb; padding: 0.3rem 0.6rem 0.3rem 1rem; }
        .search-box input { border: none; background: transparent; padding: 0.5rem; width: 220px; outline: none; }
        .product-grid-home { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; margin: 1.5rem 0; }
        .product-card { background: #fff; border-radius: 28px; overflow: hidden; border: 1px solid #f0e8dd; transition: all .3s; cursor: pointer; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 25px 35px -12px rgba(0,0,0,.15); border-color: #c0a86a; }
        .card-img { width: 100%; height: 210px; object-fit: cover; }
        .card-info { padding: 1.2rem 1rem 1rem; }
        .card-title { font-weight: 800; font-size: 1.25rem; }
        .card-sku { font-size: .7rem; color: #9e8e6e; }
        .card-type { display: inline-block; background: #f0efea; border-radius: 20px; padding: 0.2rem 0.7rem; font-size: .7rem; }
        .card-buttons { display: flex; gap: 0.8rem; padding: 0.8rem 1rem 1.2rem; border-top: 1px solid #f0e8dd; }
        .btn-card { flex: 1; text-align: center; padding: 0.5rem 0; border-radius: 40px; font-weight: 600; cursor: pointer; border: none; }
        .btn-detail { background: #f5efe5; color: #5a4a2e; }
        .btn-inquiry { background: #c0a86a; color: #fff; }
        .detail-container { background: #fff; border-radius: 32px; padding: 2rem; }
        .back-home-btn { background: none; border: none; color: #ab8e54; font-weight: 600; cursor: pointer; margin-bottom: 1.5rem; }
        .product-grid-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; margin-bottom: 2rem; }
        .main-image-card { background: #fefaf5; border-radius: 28px; border: 1px solid #f1efe7; aspect-ratio: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        .main-image-card img { width: 100%; height: 100%; object-fit: cover; }
        .carousel-nav { position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; padding: 0 0.5rem; pointer-events: none; }
        .nav-btn { background: rgba(255,255,255,.9); border-radius: 40px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        .thumbnail-strip { display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; }
        .thumb-item { width: 80px; height: 80px; border-radius: 16px; overflow: hidden; cursor: pointer; border: 2px solid transparent; }
        .thumb-item.active { border-color: #c0a86a; }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; }
        .details-section { display: flex; flex-direction: column; gap: 1rem; }
        .brand-badge { background: #fef4e6; color: #c0a86a; display: inline-block; padding: 0.2rem 0.8rem; border-radius: 40px; font-size: .8rem; }
        .product-title { font-size: 1.8rem; font-weight: 700; }
        .spec-list { border-top: 1px solid #ece7db; border-bottom: 1px solid #ece7db; padding: 1rem 0; display: flex; flex-direction: column; gap: 0.6rem; }
        .spec-item { display: flex; font-size: .9rem; }
        .spec-label { width: 100px; font-weight: 600; }
        .contact-detail-btn { background: #c0a86a; color: #fff; border: none; padding: 0.8rem; border-radius: 48px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .info-tabs { display: flex; gap: 2rem; border-bottom: 1px solid #e2dacf; margin: 1rem 0; }
        .tab-btn { background: none; border: none; font-weight: 600; padding: 0.5rem 0; cursor: pointer; color: #6c7a66; }
        .tab-btn.active { color: #2c5e2a; border-bottom: 2px solid #c0a86a; }
        .tab-content { display: none; background: #fefcf8; padding: 1.2rem; border-radius: 24px; }
        .tab-content.active { display: block; }
        .desc-list { list-style: none; }
        .desc-list li { display: flex; gap: 0.6rem; margin-bottom: 0.7rem; }
        .spec-table { display: grid; grid-template-columns: 140px 1fr; gap: 0.8rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; border-radius: 32px; max-width: 400px; width: 90%; padding: 2rem; text-align: center; position: relative; }
        .modal-close { position: absolute; top: 1rem; right: 1.5rem; font-size: 1.5rem; cursor: pointer; }
        .contact-info-item { background: #f8f4ec; border-radius: 40px; padding: 0.8rem; margin: 1rem 0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
        .copy-btn { background: #e8dfd1; border: none; padding: 0.3rem 0.8rem; border-radius: 30px; cursor: pointer; }
        .error-message { background: #ffeee8; border-left: 5px solid #d9534f; padding: 1rem; margin-bottom: 1.5rem; border-radius: 20px; color: #a94442; }
        .no-results { grid-column: 1/-1; text-align: center; padding: 3rem; background: #fefcf8; border-radius: 40px; color: #aa9b7a; }
        footer { text-align: center; margin-top: 2rem; font-size: .75rem; color: #b9aa87; }
        @media (max-width:850px){ .product-grid-detail{grid-template-columns:1fr} .filters-bar{flex-direction:column;align-items:stretch} }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 主页 -->
    <div id="homeView" class="view">
        <div class="home-header">
            <h1><i class="fas fa-utensil-spoon"></i> Chef's Supply 专业重型餐具</h1>
            <p>商用级聚丙烯 | 整箱批发 · 无需注册 · 直接询价</p>
        </div>
        <div id="errorBanner" class="error-message" style="display:none;"></div>
        <div class="filters-bar">
            <div class="filter-tabs" id="filterTabs"></div>
            <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="搜索产品名称或SKU..."></div>
        </div>
        <div id="productCardsContainer" class="product-grid-home"><div class="no-results">加载产品数据...</div></div>
        <footer>© Chef's Supply — 专业餐饮器具供应商 | 数据完全由外部 products.json 提供</footer>
    </div>

    <!-- 详情页 -->
    <div id="detailView" class="view hidden">
        <div class="detail-container">
            <button id="backHomeBtn" class="back-home-btn"><i class="fas fa-arrow-left"></i> 返回所有产品</button>
            <div class="product-grid-detail">
                <div class="gallery-section">
                    <div class="main-image-card" style="position: relative;">
                        <div class="carousel-nav">
                            <div class="nav-btn" id="detailPrev"><i class="fas fa-chevron-left"></i></div>
                            <div class="nav-btn" id="detailNext"><i class="fas fa-chevron-right"></i></div>
                        </div>
                        <img id="mainCarouselImg" src="" alt="产品主图">
                    </div>
                    <div class="thumbnail-strip" id="detailThumbContainer"></div>
                </div>
                <div class="details-section">
                    <div><span class="brand-badge"><i class="fas fa-store"></i> Chef's Supply</span></div>
                    <h1 class="product-title" id="detailProductName"></h1>
                    <div><span class="sku-highlight" id="detailSku"></span></div>
                    <div class="spec-list" id="detailSpecList"></div>
                    <button id="detailInquiryBtn" class="contact-detail-btn"><i class="fas fa-envelope"></i> 获取报价及联系方式</button>
                </div>
            </div>
            <div class="product-info-bottom">
                <div class="info-tabs">
                    <button class="tab-btn active" data-tab="desc">📄 关于此商品</button>
                    <button class="tab-btn" data-tab="details">🔧 产品规格详情</button>
                </div>
                <div id="detailDescTab" class="tab-content active"><ul id="detailDescList" class="desc-list"></ul></div>
                <div id="detailDetailsTab" class="tab-content"><div id="detailSpecTable" class="spec-table"></div></div>
            </div>
        </div>
    </div>
</div>

<!-- 询价弹窗 -->
<div id="inquiryModal" class="modal">
    <div class="modal-content">
        <span class="modal-close">&times;</span>
        <div class="modal-icon"><i class="fas fa-headset"></i></div>
        <h3>联系销售团队</h3>
        <p>点击下方按钮复制联系方式</p>
        <div id="modalContactInfo"></div>
    </div>
</div>

<script>
    // 联系方式（可根据需要修改）
    const CONTACT_INFO = { whatsapp: "+1 415 555 1234", email: "sales@chefs-supply.com" };

    // 全局变量
    let PRODUCTS_DATA = [];
    let currentProduct = null;
    let currentCarouselIndex = 0;
    let currentCategory = "all";
    let searchKeyword = "";

    // DOM 元素
    const homeView = document.getElementById('homeView');
    const detailView = document.getElementById('detailView');
    const productContainer = document.getElementById('productCardsContainer');
    const backHomeBtn = document.getElementById('backHomeBtn');
    const searchInput = document.getElementById('searchInput');
    const filterTabsDiv = document.getElementById('filterTabs');
    const errorBanner = document.getElementById('errorBanner');

    const modal = document.getElementById('inquiryModal');
    const modalContactInfo = document.getElementById('modalContactInfo');
    const modalClose = document.querySelector('.modal-close');

    const mainCarouselImg = document.getElementById('mainCarouselImg');
    const detailThumbContainer = document.getElementById('detailThumbContainer');
    const detailProductName = document.getElementById('detailProductName');
    const detailSku = document.getElementById('detailSku');
    const detailSpecList = document.getElementById('detailSpecList');
    const detailDescList = document.getElementById('detailDescList');
    const detailSpecTable = document.getElementById('detailSpecTable');
    const detailInquiryBtn = document.getElementById('detailInquiryBtn');
    const prevBtn = document.getElementById('detailPrev');
    const nextBtn = document.getElementById('detailNext');

    // 加载外部 JSON（无后备数据，失败则显示错误）
    async function loadData() {
        try {
            const response = await fetch('./products.json');
            if (!response.ok) throw new Error(`HTTP ${response.status}: 无法加载 products.json`);
            PRODUCTS_DATA = await response.json();
            if (!Array.isArray(PRODUCTS_DATA) || PRODUCTS_DATA.length === 0) {
                throw new Error('products.json 格式错误或为空数组');
            }
            errorBanner.style.display = 'none';
            buildFilterTabs();
            renderHome();
        } catch (err) {
            console.error(err);
            errorBanner.innerHTML = `<i class="fas fa-exclamation-triangle"></i> 加载失败：${err.message}<br>
            请确保：<br>
            1. 当前页面通过 <strong>HTTP 服务器</strong> 访问（不能直接双击打开 HTML 文件）<br>
            2. <strong>products.json</strong> 文件与此 HTML 在同一目录下<br>
            3. 使用命令启动本地服务器：<br>
            &nbsp;&nbsp;• Python: <code>python -m http.server 8080</code> 然后访问 <code>http://localhost:8080</code><br>
            &nbsp;&nbsp;• Node.js: <code>npx http-server</code><br>
            &nbsp;&nbsp;• VS Code: 安装 Live Server 插件`;
            errorBanner.style.display = 'block';
            productContainer.innerHTML = '<div class="no-results"><i class="fas fa-database"></i> 数据加载失败，请检查上方提示</div>';
        }
    }

    function buildFilterTabs() {
        const types = [...new Set(PRODUCTS_DATA.map(p => p.type))];
        filterTabsDiv.innerHTML = `<button class="filter-btn active" data-category="all">全部</button>` +
            types.map(t => `<button class="filter-btn" data-category="${t}">${t}</button>`).join('');
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.getAttribute('data-category');
                renderHome();
            });
        });
    }

    function getFilteredProducts() {
        return PRODUCTS_DATA.filter(p => {
            if (currentCategory !== "all" && p.type !== currentCategory) return false;
            if (searchKeyword.trim()) {
                const kw = searchKeyword.toLowerCase();
                return p.name.toLowerCase().includes(kw) || p.sku.toLowerCase().includes(kw);
            }
            return true;
        });
    }

    function renderHome() {
        const filtered = getFilteredProducts();
        if (filtered.length === 0) {
            productContainer.innerHTML = `<div class="no-results"><i class="fas fa-search"></i> 没有找到相关产品</div>`;
            return;
        }
        productContainer.innerHTML = filtered.map(p => `
            <div class="product-card" data-id="${p.id}">
                <img class="card-img" src="${p.images[0]}" onerror="this.src='https://placehold.co/600x400?text=Image+Error'">
                <div class="card-info">
                    <div class="card-title">${escapeHtml(p.name)}</div>
                    <div class="card-sku">${p.sku}</div>
                    <div class="card-type">${p.type}</div>
                </div>
                <div class="card-buttons">
                    <button class="btn-card btn-detail" data-id="${p.id}">查看详情</button>
                    <button class="btn-card btn-inquiry">询价</button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.btn-detail').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                const product = PRODUCTS_DATA.find(p => p.id === id);
                if (product) showDetail(product);
            });
        });
        document.querySelectorAll('.btn-inquiry').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                showInquiryModal();
            });
        });
        document.querySelectorAll('.card-img').forEach(img => {
            img.addEventListener('click', (e) => {
                const card = img.closest('.product-card');
                const id = card.getAttribute('data-id');
                const product = PRODUCTS_DATA.find(p => p.id === id);
                if (product) showDetail(product);
            });
        });
    }

    function showDetail(product) {
        currentProduct = product;
        currentCarouselIndex = 0;
        updateDetailUI();
        homeView.classList.add('hidden');
        detailView.classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    function updateDetailUI() {
        detailProductName.innerHTML = `${escapeHtml(currentProduct.name)} ${currentProduct.heavyweight ? '<span style="background:#eef3ea; padding:0.1rem 0.6rem; border-radius:20px;">HeavyWeight</span>' : ''}`;
        detailSku.innerText = currentProduct.sku + (currentProduct.modelCode ? ` | ${currentProduct.modelCode}` : '');
        detailSpecList.innerHTML = `
            <div class="spec-item"><span class="spec-label">产品类型</span><span>${escapeHtml(currentProduct.type)}</span></div>
            <div class="spec-item"><span class="spec-label">材质</span><span>${escapeHtml(currentProduct.material)}</span></div>
            <div class="spec-item"><span class="spec-label">颜色</span><span>${escapeHtml(currentProduct.color)}</span></div>
            <div class="spec-item"><span class="spec-label">包装规格</span><span>1000个/箱</span></div>
            <div class="spec-item"><span class="spec-label">适用场景</span><span>餐厅 / 学校 / 医院 / 食堂 / 面包店</span></div>
        `;
        detailDescList.innerHTML = (currentProduct.features || []).map(f => `<li><i class="fas fa-check-circle"></i> ${escapeHtml(f)}</li>`).join('');
        const specs = currentProduct.specDetails || {};
        detailSpecTable.innerHTML = Object.entries(specs).map(([k, v]) => `<span>${escapeHtml(k)}</span><span><strong>${escapeHtml(v)}</strong></span>`).join('');
        renderCarouselImages();
        buildThumbnails();
    }

    function renderCarouselImages() {
        const images = currentProduct.images;
        if (images && images.length) mainCarouselImg.src = images[currentCarouselIndex];
    }

    function buildThumbnails() {
        detailThumbContainer.innerHTML = '';
        (currentProduct.images || []).forEach((src, idx) => {
            const thumb = document.createElement('div');
            thumb.className = `thumb-item ${idx === currentCarouselIndex ? 'active' : ''}`;
            thumb.innerHTML = `<img src="${src}">`;
            thumb.addEventListener('click', () => {
                currentCarouselIndex = idx;
                renderCarouselImages();
                updateThumbnailActive();
            });
            detailThumbContainer.appendChild(thumb);
        });
    }

    function updateThumbnailActive() {
        document.querySelectorAll('#detailThumbContainer .thumb-item').forEach((t, i) => {
            if (i === currentCarouselIndex) t.classList.add('active');
            else t.classList.remove('active');
        });
    }

    function nextSlide() {
        const imgs = currentProduct?.images;
        if (imgs?.length) {
            currentCarouselIndex = (currentCarouselIndex + 1) % imgs.length;
            renderCarouselImages();
            updateThumbnailActive();
        }
    }

    function prevSlide() {
        const imgs = currentProduct?.images;
        if (imgs?.length) {
            currentCarouselIndex = (currentCarouselIndex - 1 + imgs.length) % imgs.length;
            renderCarouselImages();
            updateThumbnailActive();
        }
    }

    function goToHome() {
        homeView.classList.remove('hidden');
        detailView.classList.add('hidden');
        renderHome();
        window.scrollTo(0, 0);
    }

    function showInquiryModal() {
        modalContactInfo.innerHTML = `
            <div class="contact-info-item"><span><i class="fab fa-whatsapp"></i> WhatsApp</span><span>${CONTACT_INFO.whatsapp}</span><button class="copy-btn" data-copy="${CONTACT_INFO.whatsapp}">复制</button></div>
            <div class="contact-info-item"><span><i class="far fa-envelope"></i> 邮箱</span><span>${CONTACT_INFO.email}</span><button class="copy-btn" data-copy="${CONTACT_INFO.email}">复制</button></div>
        `;
        modal.style.display = 'flex';
        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                navigator.clipboard.writeText(btn.getAttribute('data-copy'));
                btn.innerHTML = '已复制';
                setTimeout(() => btn.innerHTML = '复制', 1000);
            });
        });
    }

    function closeModal() { modal.style.display = 'none'; }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    // 初始化 Tabs 切换
    function initDetailTabs() {
        document.querySelectorAll('#detailView .tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.getAttribute('data-tab');
                document.querySelectorAll('#detailView .tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const descTab = document.getElementById('detailDescTab');
                const detailsTab = document.getElementById('detailDetailsTab');
                if (tab === 'desc') { descTab.classList.add('active'); detailsTab.classList.remove('active'); }
                else { descTab.classList.remove('active'); detailsTab.classList.add('active'); }
            });
        });
    }

    // 绑定事件
    backHomeBtn.addEventListener('click', goToHome);
    prevBtn.addEventListener('click', prevSlide);
    nextBtn.addEventListener('click', nextSlide);
    detailInquiryBtn.addEventListener('click', showInquiryModal);
    modalClose.addEventListener('click', closeModal);
    window.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    searchInput.addEventListener('input', (e) => { searchKeyword = e.target.value; renderHome(); });
    initDetailTabs();

    // 启动
    loadData();
</script>
</body>
</html>
